# Industry routing table.
#
# This is the "think downstream" brain: given a company's SIC code (from SEC),
# decide WHICH alternative-data signals are relevant and WHAT seed search terms
# to use. Each [[industry]] block matches one or more SIC codes (exact or by
# 2/3-digit prefix). The first matching block (most specific prefix wins) is used.
#
# Placeholders in seed_terms / queries:
#   {brand}   -> short company name (e.g. "Winnebago")
#   {ticker}  -> ticker (e.g. "WGO")
#
# `connectors` lists data sources to fan out to (must match a registered source).
# `macro_series` are FRED series ids relevant to demand for this industry.
# `subreddits` seed the Reddit sentiment connector.

default_connectors = ["google_trends", "wikipedia", "edgar"]
default_seed_terms = ["{brand}", "buy {brand}", "{brand} reviews"]

[[industry]]
key = "rv_towables_powersports"
label = "RV / Towables / Powersports"
sic = [3792, 3713, 3716, 3751, 3799]
seed_terms = ["buy an RV", "RVs for sale", "RV dealer near me", "travel trailer for sale", "{brand}"]
connectors = ["google_trends", "wikipedia", "edgar", "fred", "reddit"]
macro_series = ["UMCSENT", "DSPIC96", "GASREGW", "PSAVERT"]
subreddits = ["GoRVing", "RVLiving", "Camping"]
notes = "Big-ticket discretionary durable; demand leads shipments. Watch consumer sentiment, gas prices, dealer inventory."

[[industry]]
key = "autos_oem"
label = "Automobiles & Light Trucks (OEM)"
sic = [3711, 3714]
seed_terms = ["buy a car", "{brand} for sale", "{brand} lease deals", "new {brand}", "{brand} inventory"]
connectors = ["google_trends", "wikipedia", "edgar", "fred", "reddit"]
macro_series = ["UMCSENT", "TERMCBAUTO48NS", "GASREGW", "TOTALSA"]
subreddits = ["cars", "whatcarshouldIbuy"]
notes = "Add dealer-inventory / listings connector (Phase 3) for days-supply and pricing."

